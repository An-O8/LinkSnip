<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Codes — LinkSnip</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar">
  <a href="/pages/dashboard.html" class="navbar-brand">🔗 LinkSnip</a>
  <ul class="navbar-nav">
    <li><span id="user-name" style="font-size:14px;color:var(--muted);"></span></li>
    <li><button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button></li>
    <li><button onclick="logout()" class="btn btn-outline btn-sm">Logout</button></li>
  </ul>
</nav>

<div class="layout">
  <aside class="sidebar">
    <a href="/pages/dashboard.html" class="sidebar-link">📊 Dashboard</a>
    <a href="/pages/analytics.html" class="sidebar-link">📈 Analytics</a>
    <a href="/pages/qr.html" class="sidebar-link active">📱 QR Codes</a>
    <a href="/pages/settings.html" class="sidebar-link">⚙️ Settings</a>
    <div id="admin-link" class="hidden">
      <a href="/pages/admin.html" class="sidebar-link">🛡️ Admin Panel</a>
    </div>
  </aside>

  <main class="main-content">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start;">

      <!-- Left: controls -->
      <div>
        <div class="card mb-6">
          <div class="card-header">
            <h2 class="card-title">Generate QR Code</h2>
          </div>

          <div class="form-group">
            <label class="form-label">Select link</label>
            <select id="link-select" class="form-input">
              <option value="">Loading...</option>
            </select>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">QR Color</label>
              <div style="display:flex; align-items:center; gap:10px;">
                <input type="color" id="qr-color" value="#000000" style="width:40px; height:36px; padding:2px; border:1px solid var(--border); border-radius:8px; cursor:pointer;">
                <input type="text" id="qr-color-hex" class="form-input" value="000000" placeholder="000000" style="font-family:monospace;">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Background Color</label>
              <div style="display:flex; align-items:center; gap:10px;">
                <input type="color" id="qr-bg" value="#ffffff" style="width:40px; height:36px; padding:2px; border:1px solid var(--border); border-radius:8px; cursor:pointer;">
                <input type="text" id="qr-bg-hex" class="form-input" value="ffffff" placeholder="ffffff" style="font-family:monospace;">
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Size: <span id="size-label">400</span>px</label>
              <input type="range" id="qr-size" min="150" max="1000" step="50" value="400" style="width:100%;">
            </div>
            <div class="form-group">
              <label class="form-label">Format</label>
              <select id="qr-format" class="form-input">
                <option value="png">PNG (raster)</option>
                <option value="svg">SVG (vector, scales infinitely)</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Center Logo URL (optional, PNG only)</label>
            <input type="url" id="logo-url" class="form-input" placeholder="https://yoursite.com/logo.png">
          </div>

          <button onclick="generateQR()" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
            📱 Generate QR Code
          </button>
        </div>

        <!-- Quick color presets -->
        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Color presets</h2>
          </div>
          <div style="display:flex; flex-wrap:wrap; gap:10px;">
            <button onclick="applyPreset('000000','ffffff')" class="preset-btn" style="background:#000; color:#fff;">Black</button>
            <button onclick="applyPreset('4f46e5','ffffff')" class="preset-btn" style="background:#4f46e5; color:#fff;">Indigo</button>
            <button onclick="applyPreset('059669','ffffff')" class="preset-btn" style="background:#059669; color:#fff;">Green</button>
            <button onclick="applyPreset('dc2626','ffffff')" class="preset-btn" style="background:#dc2626; color:#fff;">Red</button>
            <button onclick="applyPreset('0ea5e9','ffffff')" class="preset-btn" style="background:#0ea5e9; color:#fff;">Blue</button>
            <button onclick="applyPreset('7c3aed','ffffff')" class="preset-btn" style="background:#7c3aed; color:#fff;">Purple</button>
          </div>
        </div>
      </div>

      <!-- Right: QR preview -->
      <div class="card" style="text-align:center; padding:40px 24px;">
        <div id="qr-empty" style="color:var(--muted-2);">
          <div style="font-size:80px; margin-bottom:16px;">📱</div>
          <p>Your QR code will appear here</p>
        </div>
        <div id="qr-result" class="hidden">
          <img id="qr-image" src="" alt="QR Code" style="width:280px; height:280px; border-radius:12px; border:1px solid var(--border); background:#fff;">
          <div style="margin-top:16px; font-size:13px; color:var(--muted);" id="qr-url-label"></div>
          <div style="display:flex; gap:10px; justify-content:center; margin-top:20px; flex-wrap:wrap;">
            <button onclick="downloadQR()" class="btn btn-primary">Download <span id="download-format-label">PNG</span></button>
            <button onclick="copyQR()" class="btn btn-outline" id="copy-qr-btn">Copy Image</button>
          </div>
        </div>
      </div>

    </div>

    <!-- All QR codes table -->
    <div class="card mt-4">
      <div class="card-header">
        <h2 class="card-title">All your links</h2>
        <p style="font-size:13px; color:var(--muted);">Click "QR" on any link to generate its code</p>
      </div>
      <table class="links-table">
        <thead>
          <tr>
            <th>Short URL</th>
            <th class="hide-mobile">Destination</th>
            <th>Clicks</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="links-tbody"></tbody>
      </table>
    </div>
  </main>
</div>

<style>
  .preset-btn {
    padding: 8px 14px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .preset-btn:hover { opacity: 0.8; }
</style>

<script src="/js/api.js"></script>
<script>
  if (!requireAuth()) throw new Error()
  initTheme()
  const user = getUser()
  document.getElementById('user-name').textContent = user.name
  if (user.role === 'admin') document.getElementById('admin-link').classList.remove('hidden')

  let currentQRDataUrl = ''
  let currentFormat = 'png'
  let links = []

  // Sync color picker and hex input
  document.getElementById('qr-color').addEventListener('input', e => {
    document.getElementById('qr-color-hex').value = e.target.value.replace('#','')
  })
  document.getElementById('qr-bg').addEventListener('input', e => {
    document.getElementById('qr-bg-hex').value = e.target.value.replace('#','')
  })
  document.getElementById('qr-color-hex').addEventListener('input', e => {
    if (e.target.value.length === 6) document.getElementById('qr-color').value = '#' + e.target.value
  })
  document.getElementById('qr-bg-hex').addEventListener('input', e => {
    if (e.target.value.length === 6) document.getElementById('qr-bg').value = '#' + e.target.value
  })
  document.getElementById('qr-size').addEventListener('input', e => {
    document.getElementById('size-label').textContent = e.target.value
  })
  document.getElementById('qr-format').addEventListener('change', e => {
    document.getElementById('download-format-label').textContent = e.target.value.toUpperCase()
    // SVG can't be composited with a logo server-side in this simple setup
    document.getElementById('logo-url').disabled = e.target.value === 'svg'
  })

  function applyPreset(fg, bg) {
    document.getElementById('qr-color').value    = '#' + fg
    document.getElementById('qr-color-hex').value = fg
    document.getElementById('qr-bg').value        = '#' + bg
    document.getElementById('qr-bg-hex').value    = bg
  }

  async function loadLinks() {
    const { ok, data } = await apiFetch('/links')
    if (!ok || !data.links.length) return

    links = data.links

    document.getElementById('link-select').innerHTML =
      '<option value="">— Select a link —</option>' +
      links.map(l => `<option value="${l.id}">${l.shortCode} — ${l.originalUrl.slice(0,40)}...</option>`).join('')

    document.getElementById('links-tbody').innerHTML = links.map(l => `
      <tr>
        <td><span style="color:var(--primary); font-weight:500;">/${l.shortCode}</span></td>
        <td class="hide-mobile" style="color:var(--muted); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${l.originalUrl}</td>
        <td>${formatNumber(l.clickCount)}</td>
        <td>
          <button onclick="selectAndGenerate('${l.id}')" class="btn btn-outline btn-sm">📱 QR</button>
        </td>
      </tr>
    `).join('')
  }

  function selectAndGenerate(id) {
    document.getElementById('link-select').value = id
    generateQR()
    window.scrollTo({ top: 0, behavior: 'smooth' })
  }

  async function generateQR() {
    const linkId = document.getElementById('link-select').value
    if (!linkId) return toast('Please select a link first.', 'error')

    const color = document.getElementById('qr-color-hex').value || '000000'
    const bg    = document.getElementById('qr-bg-hex').value    || 'ffffff'
    const size  = document.getElementById('qr-size').value      || 400
    const format = document.getElementById('qr-format').value
    const logoUrl = format === 'png' ? document.getElementById('logo-url').value : ''

    currentFormat = format

    const query = `color=${color}&bg=${bg}&size=${size}&format=${format}` + (logoUrl ? `&logoUrl=${encodeURIComponent(logoUrl)}` : '')
    const { ok, data } = await apiFetch(`/links/${linkId}/qr?${query}`)
    if (!ok) return toast('Could not generate QR code.', 'error')

    currentQRDataUrl = data.qr

    document.getElementById('qr-image').src = data.qr
    document.getElementById('qr-url-label').textContent = data.shortUrl
    document.getElementById('qr-empty').classList.add('hidden')
    document.getElementById('qr-result').classList.remove('hidden')
    document.getElementById('copy-qr-btn').style.display = format === 'svg' ? 'none' : 'inline-flex'
  }

  function downloadQR() {
    if (!currentQRDataUrl) return
    const link = document.createElement('a')
    link.href     = currentQRDataUrl
    link.download = 'qrcode.' + currentFormat
    link.click()
  }

  async function copyQR() {
    if (currentFormat === 'svg') return
    const res  = await fetch(currentQRDataUrl)
    const blob = await res.blob()
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })])
    toast('QR image copied to clipboard!')
  }

  function logout() { clearAuth(); window.location.href = '/pages/login.html' }

  loadLinks()
</script>
</body>
</html>
