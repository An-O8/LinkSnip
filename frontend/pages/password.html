<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Required — LinkSnip</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); padding:20px;">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:48px; margin-bottom:12px;">🔒</div>
      <h1 style="font-size:22px;">Password Required</h1>
      <p>This link is password protected</p>
    </div>

    <div id="alert" class="alert hidden"></div>

    <form id="pwd-form">
      <div class="form-group">
        <label class="form-label">Enter Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" autofocus required>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
        Unlock Link
      </button>
    </form>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Get the short code from the URL: /pages/password.html?code=abc123
  const code = new URLSearchParams(window.location.search).get('code')

  if (!code) window.location.href = '/pages/404.html'

  document.getElementById('pwd-form').addEventListener('submit', async (e) => {
    e.preventDefault()
    const btn = document.getElementById('submit-btn')
    btn.disabled = true
    btn.textContent = 'Checking...'

    const pwd = document.getElementById('password').value

    // Try the redirect with the password as a query param
    const res = await fetch(`/${code}?pwd=${encodeURIComponent(pwd)}`, {
      method: 'GET',
      redirect: 'manual'  // don't auto-follow the redirect
    })

    if (res.type === 'opaqueredirect' || res.status === 301 || res.status === 302) {
      // Password correct - now follow the redirect properly
      window.location.href = `/${code}?pwd=${encodeURIComponent(pwd)}`
    } else {
      const data = await res.json().catch(() => ({ message: 'Wrong password.' }))
      showAlert('alert', data.message || 'Wrong password.')
      btn.disabled = false
      btn.textContent = 'Unlock Link'
    }
  })
</script>
</body>
</html>
