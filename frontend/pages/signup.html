<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — LinkSnip</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>🔗 LinkSnip</h1>
      <p>Create your free account</p>
    </div>

    <div id="alert" class="alert hidden"></div>

    <form id="signup-form">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-input" placeholder="Anurag Sharma" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-input" placeholder="you@example.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-input" placeholder="At least 6 characters" required>
      </div>
      <button type="submit" id="submit-btn" class="btn btn-primary" style="width:100%; justify-content:center; padding:12px;">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/pages/login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  initTheme()
  if (getToken()) window.location.href = '/pages/dashboard.html'

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault()

    const btn = document.getElementById('submit-btn')
    btn.disabled = true
    btn.textContent = 'Creating account...'

    const name     = document.getElementById('name').value
    const email    = document.getElementById('email').value
    const password = document.getElementById('password').value

    const { ok, data } = await apiFetch('/auth/signup', {
      method: 'POST',
      body: { name, email, password }
    })

    if (ok) {
      setAuth(data.token, data.user)
      window.location.href = '/pages/dashboard.html'
    } else {
      showAlert('alert', data.message)
      btn.disabled = false
      btn.textContent = 'Create Account'
    }
  })
</script>
</body>
</html>
